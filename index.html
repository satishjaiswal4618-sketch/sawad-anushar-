<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sawad Anushar</title>

<style>
body { font-family: Arial; padding: 20px; background:#fff8f0; }
h1 { color: #d35400; }

.product {
  border:1px solid #ddd;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  background:#fff;
}

button {
  padding:10px;
  background:orange;
  border:none;
  cursor:pointer;
  border-radius:5px;
}

input, textarea {
  width:100%;
  padding:8px;
  margin-top:5px;
}

#label {
  border:2px dashed black;
  padding:15px;
  margin-top:10px;
  background:#fff;
}

#thankyou {
  border:2px solid green;
  padding:15px;
  margin-top:15px;
  background:#f0fff0;
}
</style>
</head>

<body>

<h1>🛒 Sawad Anushar Store</h1>

<!-- PRODUCTS -->

<div class="product">
  <h2>Thekua (250g)</h2>
  <p>Price: ₹250</p>
  <p><b>🎉 Buy 1 Get 1 Free</b></p>
  <button onclick="addToCart('Thekua',250)">Add to Cart</button>
</div>

<div class="product">
  <h2>Namkeen (250g)</h2>
  <p>Price: ₹200</p>
  <p><b>🎉 Buy 1 Get 1 Free</b></p>
  <button onclick="addToCart('Namkeen',200)">Add to Cart</button>
</div>

<hr>

<h2>Total: ₹<span id="total">0</span></h2>
<h3>Delivery: ₹<span id="delivery">0</span></h3>
<h2>Final Amount: ₹<span id="final">0</span></h2>

<!-- WHATSAPP ORDER -->
<button onclick="sendWhatsApp()">📲 Order on WhatsApp</button>

<hr>

<!-- CUSTOMER DETAILS -->
<h2>📦 Shipping Details</h2>

<input id="name" placeholder="Customer Name">
<input id="phone" placeholder="Phone Number">
<textarea id="address" placeholder="Full Address"></textarea>

<button onclick="generateLabel()">Generate Label</button>

<!-- LABEL -->
<div id="label">Shipping Label Preview</div>

<!-- THANK YOU -->
<div id="thankyou" style="display:none;"></div>

<script>

let total = 0;
let cart = [];

function addToCart(name, price) {
  total += price;
  cart.push(name);
  updateTotal();
}

function updateTotal() {
  let delivery = total > 1000 ? 0 : 149;

  document.getElementById("total").innerText = total;
  document.getElementById("delivery").innerText = delivery;
  document.getElementById("final").innerText = total + delivery;
}

// SHIPPING LABEL + THANK YOU
function generateLabel() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  let delivery = total > 1000 ? 0 : 149;
  let finalAmount = total + delivery;

  let items = cart.join(", ");

  document.getElementById("label").innerHTML = `
    <h3>SAWAD ANUSHAR</h3>
    <p><b>Name:</b> ${name}</p>
    <p><b>Phone:</b> ${phone}</p>
    <p><b>Address:</b><br>${address}</p>
    <hr>
    <p><b>Products:</b> ${items}</p>
    <p><b>Amount:</b> ₹${total}</p>
    <p><b>Delivery:</b> ₹${delivery}</p>
    <p><b>Total:</b> ₹${finalAmount}</p>
    <hr>
    <p>From: Sawad Anushar, Gorakhpur</p>
  `;

  document.getElementById("thankyou").style.display = "block";
  document.getElementById("thankyou").innerHTML = `
    <h3>🙏 Thank You!</h3>
    <p>Dear ${name},</p>
    <p>Thanks for ordering from <b>Sawad Anushar</b> ❤️</p>
    <p>Enjoy your Thekua & Namkeen 😋</p>
    <p>Visit Again 🙌</p>
    <p>📞 8840580032</p>
  `;
}

// WHATSAPP ORDER
function sendWhatsApp() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let address = document.getElementById("address").value;

  let delivery = total > 1000 ? 0 : 149;
  let finalAmount = total + delivery;
  let items = cart.join(", ");

  let message = `🛒 *New Order - Sawad Anushar*
  
👤 Name: ${name}
📞 Phone: ${phone}
🏠 Address: ${address}

🛍 Products: ${items}

💰 Amount: ₹${total}
🚚 Delivery: ₹${delivery}
🧾 Total: ₹${finalAmount}

🎉 Offer: Buy 1 Get 1 Free`;

  let url = "https://wa.me/918840580032?text=" + encodeURIComponent(message);

  window.open(url, "_blank");
}

</script>

</body>
</html>
